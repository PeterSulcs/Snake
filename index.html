<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#24115e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Snake" />
    <title>Snake</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <aside class="sidebar">
          <div class="heading-row">
            <div>
              <h1>Snake</h1>
              <p class="subtitle">TypeScript neon edition</p>
            </div>
            <button id="wrap-toggle" class="toggle-button" type="button" aria-pressed="false">Wrap: Off</button>
          </div>

          <div class="stats">
            <div><span>Score</span><strong id="score">0</strong></div>
            <div><span>Best</span><strong id="best">0</strong></div>
            <div><span>Speed</span><strong id="speed">1x</strong></div>
          </div>

          <div class="status-stack" aria-live="polite">
            <p id="install-status" class="status-pill">Install: Checking browser support…</p>
            <p id="haptics-status" class="status-pill">Haptics: Checking device support…</p>
          </div>

          <div class="controls">
            <p>Use arrow keys or WASD to move. Press space to restart after game over, or tap Restart on mobile.</p>
          </div>

          <div class="touch-controls" aria-label="Touch controls">
            <button data-dir="up" type="button" aria-label="Move up">↑</button>
            <div class="touch-row">
              <button data-dir="left" type="button" aria-label="Move left">←</button>
              <button data-dir="down" type="button" aria-label="Move down">↓</button>
              <button data-dir="right" type="button" aria-label="Move right">→</button>
            </div>
          </div>
        </aside>

        <div class="board-shell">
          <canvas id="game" width="480" height="480" aria-label="Snake game board"></canvas>
          <button id="restart-button" class="restart-button" type="button" hidden>Restart</button>
        </div>
      </section>
    </main>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
