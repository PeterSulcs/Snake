<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="heading-row">
          <div>
            <h1>Snake</h1>
            <p class="subtitle">TypeScript edition</p>
          </div>
          <button id="wrap-toggle" class="toggle-button" type="button" aria-pressed="false">Wrap: Off</button>
        </div>

        <div class="stats">
          <div><span>Score</span><strong id="score">0</strong></div>
          <div><span>Best</span><strong id="best">0</strong></div>
          <div><span>Speed</span><strong id="speed">1x</strong></div>
        </div>

        <canvas id="game" width="480" height="480" aria-label="Snake game board"></canvas>

        <div class="controls">
          <p>Use arrow keys or WASD to move. Press space to restart after game over.</p>
        </div>

        <div class="touch-controls" aria-label="Touch controls">
          <div></div>
          <button data-dir="up" type="button">▲</button>
          <div></div>
          <button data-dir="left" type="button">◀</button>
          <button data-dir="down" type="button">▼</button>
          <button data-dir="right" type="button">▶</button>
        </div>
      </section>
    </main>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
